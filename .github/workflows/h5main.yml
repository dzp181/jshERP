name: Build jshERP Frontend

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Install and Build
        working-directory: ./jshERP-web
        run: |
          # 核心修复：添加 --legacy-peer-deps
          npm install --legacy-peer-deps --registry=https://registry.npmmirror.com
          
          export NODE_OPTIONS=--max-old-space-size=4096
          npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: jshERP-web/dist/

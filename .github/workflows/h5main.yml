name: Build jshERP Frontend

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          # 核心修复：添加这行，告诉它去哪个文件夹找 lock 文件
          cache: 'npm'
          cache-dependency-path: 'jshERP-web/package-lock.json'

      - name: Install and Build
        # 强制在这个目录下运行后续所有命令
        working-directory: ./jshERP-web
        run: |
          # 1. 安装依赖
          npm install
          
          # 2. 增加内存限制并执行打包
          export NODE_OPTIONS=--max-old-space-size=4096
          npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: jshERP-web/dist/

name: Build jshERP Frontend

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          # 删除了 cache 相关配置，避免因找不到文件而报错

      - name: Install and Build
        working-directory: ./jshERP-web
        run: |
          # 使用 --no-package-lock 确保安装过程不依赖 lock 文件
          npm install --no-package-lock
          
          export NODE_OPTIONS=--max-old-space-size=4096
          npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: jshERP-web/dist/

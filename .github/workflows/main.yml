name: Java CI with Maven (Build jshERP)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    # 关键修复：进入 jshERP-boot 目录执行 maven
    - name: Build with Maven
      run: mvn clean package -Dmaven.test.skip=true
      working-directory: ./jshERP-boot

    # 复制打包好的文件到 release
    - name: Organize Files
      run: |
        mkdir -p release
        cp -r jshERP-boot/target/* release/

    # 上传构建产物
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: jshERP-Release
        path: release/

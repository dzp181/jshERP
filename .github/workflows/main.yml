
name: Java CI with Maven (Build jshERP)

on:
  push:
    branches: [ "master" ] # 当 master 分支有变动时触发
  workflow_dispatch: # 允许手动触发打包

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 提供的 Ubuntu 虚拟机

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -Dmaven.test.skip=true

    - name: Organize Files # 整理成品文件夹
      run: |
        mkdir release
        # 这里的路径根据 jshERP 的多模块结构调整，通常在 jshERP-bin 的 target 下
        cp -r jshERP-bin/target/jshERP-bin/jshERP-bin/* release/

    - name: Upload Artifact # 将打包好的文件上传到 GitHub
      uses: actions/upload-artifact@v4
      with:
        name: jshERP-3.5-Release
        path: release/
